<rect x="679.7" y="293.2" width="42.5" height="246.8" fill="#718096"/><text x="700.9" y="284.2" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">68.5%</text><text x="700.9" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">25%</text><rect x="753.0" y="327.6" width="42.5" height="212.4" fill="#718096"/><text x="774.3" y="318.6" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">59.0%</text><text x="774.3" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">35%</text><rect x="826.3" y="378.9" width="42.5" height="161.1" fill="#718096"/><text x="847.6" y="369.9" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">44.8%</text><text x="847.6" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">50%</text><rect x="899.7" y="405.1" width="42.5" height="134.9" fill="#718096"/><text x="920.9" y="396.1" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">37.5%</text><text x="920.9" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">65%</text><rect x="973.0" y="425.4" width="42.5" height="114.6" fill="#718096"/><text x="994.3" y="416.4" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">31.8%</text><text x="994.3" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">80%</text><rect x="1046.3" y="439.4" width="42.5" height="100.6" fill="#718096"/><text x="1067.6" y="430.4" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#20242a">28.0%</text><text x="1067.6" y="565" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#606770">100%</text>
